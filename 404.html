<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#000000;--bg2:#030303;--bg3:#080808;
  --white:#ffffff;--dark:#000000;
  --accent:#0ee0cf;--accent-soft:rgba(14,224,207,0.15);--accent-mid:rgba(14,224,207,0.3);
  --blue:#3b82f6;--gold:#fbbf24;--gold-soft:rgba(251,191,36,0.1);
  --red:#ef4444;--green:#4ade80;
  --txt:#a1a1aa;--txt2:#71717a;--txt3:#52525b;--heading:#f4f4f5;
  --brd:rgba(255,255,255,0.08);--brd2:rgba(255,255,255,0.15);
  --glass-bg:rgba(255,255,255,0.02);--glass-hover:rgba(255,255,255,0.05);
}
html{scroll-behavior:smooth;overflow-y:scroll}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--txt3);border-radius:4px}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--txt);
  min-height:100vh;display:flex;flex-direction:column;
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
  opacity:0;animation:pageReveal .8s ease forwards;
}
@keyframes pageReveal{to{opacity:1}}

/* Noise overlay */
.noise{position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.03}
.noise svg{width:100%;height:100%}

/* Custom cursor */
/* ===== CUSTOM CURSOR ===== */
html.js-cursor, html.js-cursor *, html.js-cursor *::before, html.js-cursor *::after { cursor: none !important; }
html.js-cursor ::-webkit-scrollbar { cursor: auto; }
html.js-cursor *:focus { cursor: none !important; }
.cursor-dot, .cursor-outline { position: fixed; top: 0; left: 0; transform: translate(-50%, -50%); border-radius: 50%; z-index: 10000; pointer-events: none; will-change: transform; display: none; }
@media(pointer: fine){ .cursor-dot, .cursor-outline { display: block; } }
.cursor-dot { width: 6px; height: 6px; background: var(--accent); transition: opacity 0.15s, width 0.15s, height 0.15s; box-shadow: 0 0 10px var(--accent); }
.cursor-outline { width: 40px; height: 40px; border: 1px solid rgba(14,224,207,0.5); transition: width 0.3s cubic-bezier(.22,1,.36,1), height 0.3s cubic-bezier(.22,1,.36,1), background 0.3s, border-color 0.3s, opacity 0.3s; }
body.cursor-hover .cursor-dot { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
body.cursor-hover .cursor-outline { width: 64px; height: 64px; background: rgba(14,224,207,0.1); border-color: var(--accent); -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px); mix-blend-mode: screen; }
body.cursor-hidden .cursor-dot, body.cursor-hidden .cursor-outline { opacity: 0 !important; }

/* Scroll progress */
.scroll-progress{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--blue));z-index:9998;transition:width .1s}

/* ===== HEADER ===== */
header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:16px 32px;
  background:rgba(0,0,0,0.8);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--brd);
  display:flex;align-items:center;justify-content:space-between;
}

/* ===== MAIN 404 SCENE ===== */
.scene{
  flex:1;display:flex;align-items:center;justify-content:center;
  position:relative;padding:120px 24px 80px;
  overflow:hidden;
}

/* Animated background grid */
.grid-bg{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(14,224,207,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(14,224,207,0.03) 1px, transparent 1px);
  background-size:60px 60px;
  animation:gridMove 20s linear infinite;
}
@keyframes gridMove{
  to{background-position:60px 60px}
}

/* Radial glow */
.glow{
  position:absolute;width:600px;height:600px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(14,224,207,0.08) 0%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  animation:glowPulse 4s ease-in-out infinite;
}
@keyframes glowPulse{
  0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1)}
  50%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}
}

/* Floating particles */
.particles{position:absolute;inset:0;overflow:hidden}
.particle{
  position:absolute;border-radius:50%;
  background:var(--accent);
  opacity:0;
  animation:floatUp linear infinite;
}
@keyframes floatUp{
  0%{opacity:0;transform:translateY(100vh) scale(0)}
  10%{opacity:.6}
  90%{opacity:.6}
  100%{opacity:0;transform:translateY(-10vh) scale(1)}
}

/* Content card */
.content-card{
  position:relative;z-index:2;
  text-align:center;
  max-width:640px;width:100%;
  padding:48px 40px;
  background:var(--glass-bg);
  border:1px solid var(--brd);
  border-radius:24px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}

/* Glitch 404 number */
.error-code{
  font-size:clamp(100px, 20vw, 180px);
  font-weight:900;
  line-height:1;
  color:var(--heading);
  position:relative;
  margin-bottom:16px;
  animation:textFloat 6s ease-in-out infinite;
  user-select:none;
}
.error-code::before,
.error-code::after{
  content:'404';
  position:absolute;top:0;left:0;right:0;
  overflow:hidden;
}
.error-code::before{
  color:var(--accent);
  animation:glitch1 3s infinite;
  clip-path:polygon(0 0,100% 0,100% 33%,0 33%);
}
.error-code::after{
  color:var(--red);
  animation:glitch2 3s infinite;
  clip-path:polygon(0 66%,100% 66%,100% 100%,0 100%);
}
@keyframes glitch1{
  0%,92%,100%{transform:translate(0)}
  93%{transform:translate(-8px,2px)}
  94%{transform:translate(5px,-1px)}
  95%{transform:translate(-3px,3px)}
  96%{transform:translate(6px,-2px)}
}
@keyframes glitch2{
  0%,92%,100%{transform:translate(0)}
  93%{transform:translate(6px,-2px)}
  94%{transform:translate(-4px,1px)}
  95%{transform:translate(3px,-3px)}
  96%{transform:translate(-5px,2px)}
}
@keyframes textFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

/* Scan line */
.scan-line{
  position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:.4;
  animation:scanDown 3s ease-in-out infinite;
  z-index:3;
}
@keyframes scanDown{
  0%{top:0}
  100%{top:100%}
}

.error-title{
  font-size:clamp(20px, 4vw, 28px);
  font-weight:700;color:var(--heading);
  margin-bottom:12px;
  opacity:0;animation:fadeInUp .6s .3s ease forwards;
}
.error-desc{
  font-size:clamp(14px, 2.5vw, 16px);
  color:var(--txt);line-height:1.7;
  margin-bottom:32px;
  opacity:0;animation:fadeInUp .6s .5s ease forwards;
}
@keyframes fadeInUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

/* Buttons */
.btn-group{
  display:flex;gap:12px;justify-content:center;flex-wrap:wrap;
  opacity:0;animation:fadeInUp .6s .7s ease forwards;
}
.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:14px 28px;
  border-radius:12px;
  font-family:inherit;font-size:15px;font-weight:600;
  text-decoration:none;
  transition:all .3s ease;
  border:none;outline:none;
}
.btn-primary{
  background:var(--accent);color:var(--dark);
  box-shadow:0 0 20px rgba(14,224,207,0.3);
}
.btn-primary:hover{
  box-shadow:0 0 40px rgba(14,224,207,0.5);
  transform:translateY(-2px);
}
.btn-secondary{
  background:var(--glass-bg);color:var(--heading);
  border:1px solid var(--brd2);
}
.btn-secondary:hover{
  background:var(--glass-hover);
  border-color:var(--accent);
  transform:translateY(-2px);
}
.btn svg{width:18px;height:18px}

/* Orbiting dots around the card */
.orbit{
  position:absolute;
  width:calc(100% + 80px);height:calc(100% + 80px);
  top:-40px;left:-40px;
  border-radius:24px;
  animation:spinOrbit 12s linear infinite;
  pointer-events:none;
}
.orbit-dot{
  position:absolute;width:6px;height:6px;
  background:var(--accent);border-radius:50%;
  box-shadow:0 0 12px var(--accent);
}
.orbit-dot:nth-child(1){top:0;left:50%;transform:translate(-50%,-50%)}
.orbit-dot:nth-child(2){bottom:0;right:0;transform:translate(50%,50%)}
.orbit-dot:nth-child(3){top:50%;left:0;transform:translate(-50%,-50%)}
@keyframes spinOrbit{to{transform:rotate(360deg)}}

/* Random code rain */
.code-rain{
  position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:1;
}
.code-col{
  position:absolute;top:-100%;
  font-family:'Courier New',monospace;
  font-size:14px;
  color:var(--accent);
  opacity:.08;
  writing-mode:vertical-rl;
  animation:rain linear infinite;
  white-space:nowrap;
}
@keyframes rain{
  to{transform:translateY(calc(200vh + 100%))}
}

/* Spotlight follow effect */
.spotlight{
  position:fixed;
  width:300px;height:300px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(14,224,207,0.06) 0%,transparent 70%);
  pointer-events:none;z-index:1;
  transform:translate(-50%,-50%);
}

/* ===== FOOTER ===== */
.site-footer{border-top:1px solid var(--brd);padding:32px 0 40px;line-height:normal;font-family:'Inter',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:auto;-moz-osx-font-smoothing:auto;text-rendering:auto}
.footer-bottom{max-width:1140px;margin:0 auto;padding:0 32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px}
.footer-bottom .logo{display:flex;align-items:center;gap:14px;text-decoration:none;transition:opacity .3s;color:var(--heading)}
.footer-bottom .logo:hover{opacity:.8}
.footer-bottom .logo svg{width:44px;height:44px}
.footer-bottom .logo span{font-size:26px;font-weight:700;color:var(--heading);letter-spacing:-0.03em}
.footer-legal{display:flex;gap:20px;flex-wrap:wrap;align-items:center;width:100%}
.footer-legal a{font-size:13px;color:var(--txt3);text-decoration:underline;transition:color .3s}
.footer-legal a:hover{color:var(--txt)}
.footer-cta{background:var(--glass-bg);border:1px solid var(--brd);color:var(--white);padding:12px 28px;border-radius:60px;font-size:14px;font-weight:600;transition:all .3s;text-decoration:none}
@media(hover:hover){.footer-cta:hover{background:var(--white);color:var(--dark)}}
.footer-copy{font-size:14px;color:var(--txt3)}
@media(max-width:600px){.site-footer{padding:24px 0 32px}.footer-bottom{padding:0 20px;flex-direction:column;align-items:flex-start;gap:16px}.footer-bottom .logo{gap:10px}.footer-bottom .logo span{font-size:20px}.footer-legal{gap:10px}}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  header{padding:14px 20px}
  .content-card{padding:36px 24px}
  .error-code{margin-bottom:12px}
  footer{padding:20px;justify-content:center;text-align:center}
  .glow{width:400px;height:400px}
}
@media(max-width:480px){
  header{padding:12px 16px}
  .content-card{padding:28px 20px;border-radius:18px}
  .btn{padding:12px 22px;font-size:14px}
  .orbit{display:none}
  footer{flex-direction:column;gap:8px}
}
@media(max-width:380px){
  .error-code{font-size:80px}
  .btn-group{flex-direction:column;align-items:stretch}
  .btn{justify-content:center}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important}}
</style>
</head>
<body>

<div class="noise"><svg><filter id="n"><feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(#n)"/></svg></div>

<script>
/* ===== Custom cursor ===== */
const cursorDot = document.getElementById('cursorDot'), cursorOutline = document.getElementById('cursorOutline');
if (window.matchMedia("(pointer: fine)").matches && cursorDot && cursorOutline) {
  document.documentElement.classList.add('js-cursor');
  let mouseX = -100, mouseY = -100, outlineX = -100, outlineY = -100, isCursorActive = false;
  document.body.classList.add('cursor-hidden');
  let cursorRafId = null, cursorIdle = null;

  function showCursor() {
    if (!isCursorActive) { document.body.classList.remove('cursor-hidden'); isCursorActive = true; }
  }
  function hideCursor() {
    document.body.classList.add('cursor-hidden'); isCursorActive = false;
  }

  window.addEventListener('mousemove', (e) => {
    mouseX = e.clientX; mouseY = e.clientY;
    cursorDot.style.transform = 'translate3d(' + mouseX + 'px,' + mouseY + 'px,0) translate(-50%,-50%)';
    showCursor();
    if (!cursorRafId) startCursorLoop();
    clearTimeout(cursorIdle);
    cursorIdle = setTimeout(() => { if (cursorRafId) { cancelAnimationFrame(cursorRafId); cursorRafId = null; } }, 150);
  });

  function startCursorLoop() {
    const step = () => {
      outlineX += (mouseX - outlineX) * 0.45;
      outlineY += (mouseY - outlineY) * 0.45;
      cursorOutline.style.transform = 'translate3d(' + outlineX + 'px,' + outlineY + 'px,0) translate(-50%,-50%)';
      cursorRafId = requestAnimationFrame(step);
    };
    cursorRafId = requestAnimationFrame(step);
  }

  // Hover effect on interactive elements
  const hoverSelector = 'a, button, input, select, textarea, label, [role="button"], summary, .cl-card, .btn';
  document.querySelectorAll(hoverSelector).forEach(el => {
    el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
    el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
  });
  // Catch dynamically added elements too
  document.addEventListener('mouseover', (e) => {
    if (e.target.closest(hoverSelector)) document.body.classList.add('cursor-hover');
  });
  document.addEventListener('mouseout', (e) => {
    if (e.target.closest(hoverSelector) && !e.relatedTarget?.closest(hoverSelector)) document.body.classList.remove('cursor-hover');
  });

  // Hide when cursor leaves window (Windows: mouseleave fires on document)
  document.addEventListener('mouseleave', hideCursor);
  // Show when cursor re-enters (important for Windows alt-tab)
  document.addEventListener('mouseenter', showCursor);
  // Hide on blur / show on focus (Windows: alt-tab, taskbar click)
  window.addEventListener('blur', hideCursor);
  window.addEventListener('focus', () => { /* don't auto-show — wait for mousemove */ });
  // Hide when tab becomes hidden (Windows: switch tabs)
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) hideCursor();
  });
}

/* ===== Spotlight ===== */
(function(){
  const spot=document.querySelector('.spotlight');
  if(!spot) return;
  if(!matchMedia('(pointer:fine)').matches){spot.style.display='none';return}
  document.addEventListener('mousemove',e=>{
    spot.style.left=e.clientX+'px';
    spot.style.top=e.clientY+'px';
  });
})();

/* ===== Generate particles ===== */
(function(){
  const c=document.getElementById('particles');
  for(let i=0;i<35;i++){
    const p=document.createElement('div');
    p.className='particle';
    const size=Math.random()*4+2;
    const dur=Math.random()*8+6;
    const delay=i<20?-(Math.random()*dur):Math.random()*2;
    p.style.cssText=`
      width:${size}px;height:${size}px;
      left:${Math.random()*100}%;
      animation-duration:${dur}s;
      animation-delay:${delay}s;
    `;
    c.appendChild(p);
  }
})();

/* ===== Code rain ===== */
(function(){
  const c=document.getElementById('codeRain');
  const chars='01アイウエオカキクケコ{}[]<>/=;:$#@!%&*~^ABCDEF';
  const cols=Math.floor(window.innerWidth/50);
  for(let i=0;i<Math.min(cols,20);i++){
    const col=document.createElement('div');
    col.className='code-col';
    let str='';
    const len=Math.floor(Math.random()*20+10);
    for(let j=0;j<len;j++) str+=chars[Math.floor(Math.random()*chars.length)]+' ';
    col.textContent=str;
    col.style.cssText=`
      left:${(i/cols)*100}%;
      animation-duration:${Math.random()*8+8}s;
      animation-delay:${Math.random()*5}s;
      opacity:${Math.random()*.06+.02};
    `;
    c.appendChild(col);
  }
})();

/* ===== Glitch burst on click ===== */
var ec=document.querySelector('.error-code');if(ec) ec.addEventListener('click',function(){
  this.style.animation='none';
  this.offsetHeight;
  this.style.animation='';
  const el=this;
  el.classList.add('glitch-burst');
  const style=document.createElement('style');
  style.textContent=`
    .glitch-burst{animation:burstGlitch .5s ease!important}
    @keyframes burstGlitch{
      0%{transform:translate(0);filter:hue-rotate(0)}
      10%{transform:translate(-10px,5px);filter:hue-rotate(90deg)}
      20%{transform:translate(8px,-3px);filter:hue-rotate(180deg)}
      30%{transform:translate(-5px,8px);filter:hue-rotate(270deg)}
      40%{transform:translate(6px,-6px);filter:hue-rotate(360deg)}
      50%{transform:translate(-3px,2px) scale(1.05);filter:hue-rotate(0)}
      60%{transform:translate(4px,-4px);filter:hue-rotate(90deg)}
      70%{transform:translate(-2px,3px);filter:hue-rotate(0)}
      80%{transform:translate(1px,-1px)}
      100%{transform:translate(0);filter:hue-rotate(0)}
    }`;
  document.head.appendChild(style);
  setTimeout(()=>{el.classList.remove('glitch-burst');style.remove()},600);
});
</script>

<script>document.querySelectorAll(".js-year").forEach(el=>el.textContent=new Date().getFullYear())</script>

<script>
/* ===== Meta Pixel: Микроконверсии (404) ===== */
(function(){
  if(typeof fbq === 'undefined'){
    window.fbq = function(){
      var args = [].slice.call(arguments);
      if(args[0] === 'track' || args[0] === 'trackCustom'){
        var ev = args[1], data = args[2] || {};
        var img = new Image();
        img.src = 'https://www.facebook.com/tr?id=2342435819568558&ev=' +
          encodeURIComponent(ev) + '&cd[source]=fallback&cd[data]=' +
          encodeURIComponent(JSON.stringify(data)) + '&noscript=1';
      }
    };
  }

  /* fbc / fbp cookies */
  function getCookie(name){
    var m = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
    return m ? decodeURIComponent(m[1]) : null;
  }
  var fbc = getCookie('_fbc'), fbp = getCookie('_fbp');
  if(!fbc){
    var fbclid = new URLSearchParams(window.location.search).get('fbclid');
    if(fbclid){
      fbc = 'fb.1.' + Date.now() + '.' + fbclid;
      document.cookie = '_fbc=' + fbc + ';max-age=7776000;path=/;SameSite=Lax';
    }
  }
  try {
    if(fbc) localStorage.setItem('_fbc', fbc); else fbc = localStorage.getItem('_fbc');
    if(fbp) localStorage.setItem('_fbp', fbp); else fbp = localStorage.getItem('_fbp');
  } catch(e){}

  /* Returning Visitor */
  try {
    var visitCount = parseInt(localStorage.getItem('tc_visits') || '0', 10) + 1;
    localStorage.setItem('tc_visits', visitCount.toString());
    if(visitCount > 1) fbq('trackCustom', 'ReturningVisitor', {visit_number: visitCount, page: '404'});
  } catch(e){}

  /* Время на странице с Visibility API */
  var activeSeconds = 0, isVisible = !document.hidden, timeFired = {};
  var ti = setInterval(function(){
    if(isVisible) activeSeconds++;
    [30,60].forEach(function(t){
      if(activeSeconds >= t && !timeFired[t]){
        timeFired[t] = true;
        fbq('trackCustom', 'TimeOnPage', {seconds: t, active: true, page: '404'});
      }
    });
    if(timeFired[60]) clearInterval(ti);
  }, 1000);
  document.addEventListener('visibilitychange', function(){ isVisible = !document.hidden; });
})();
</script>
